<!doctype html>
<html class="h-full">
 <head><script src="/_sdk/telemetry_sdk.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tebak Huruf Awal</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&amp;display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Fredoka', sans-serif; }
    .bounce { animation: bounce 0.5s ease; }
    @keyframes bounce { 0%,100%{transform:scale(1)} 50%{transform:scale(1.2)} }
    .shake { animation: shake 0.4s ease; }
    @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} }
    .fade-in { animation: fadeIn 0.4s ease; }
    @keyframes fadeIn { from{opacity:0;transform:scale(0.8)} to{opacity:1;transform:scale(1)} }
    .star-pop { animation: starPop 0.6s ease forwards; }
    @keyframes starPop { 0%{transform:scale(0) rotate(0deg)} 50%{transform:scale(1.3) rotate(180deg)} 100%{transform:scale(1) rotate(360deg)} }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js" type="text/javascript"></script>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full">
  <div id="app" class="h-full w-full overflow-auto" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);">
   <div class="min-h-full flex flex-col items-center justify-center p-4"><!-- Header -->
    <div class="text-center mb-6">
     <h1 id="title" class="text-3xl md:text-4xl font-bold text-white drop-shadow-lg">🎮 Tebak Huruf Awal</h1>
     <p class="text-white/80 mt-1 text-lg">Pilih huruf pertama dari gambar!</p>
    </div><!-- Score -->
    <div class="flex gap-4 mb-4">
     <div class="bg-white/20 backdrop-blur rounded-full px-4 py-2 text-white font-semibold">
      ⭐ Skor: <span id="score">0</span>
     </div>
     <div class="bg-white/20 backdrop-blur rounded-full px-4 py-2 text-white font-semibold">
      📝 Soal: <span id="qnum">1</span>/10
     </div>
    </div><!-- Game Card -->
    <div id="game-card" class="bg-white rounded-3xl shadow-2xl p-6 md:p-8 w-full max-w-sm text-center fade-in">
     <div id="emoji-display" class="text-8xl mb-2"></div>
     <p id="item-name" class="text-xl font-semibold text-gray-700 mb-4"></p><!-- Choices -->
     <div id="choices" class="grid grid-cols-3 gap-3 mb-4"></div><!-- Feedback -->
     <div id="feedback" class="text-lg font-bold h-8"></div>
    </div><!-- Next Button --> <button id="next-btn" class="mt-4 bg-yellow-400 hover:bg-yellow-300 text-gray-800 font-bold px-8 py-3 rounded-full shadow-lg transition-all hidden text-lg">Lanjut ➡️</button> <!-- End Screen -->
    <div id="end-screen" class="hidden bg-white rounded-3xl shadow-2xl p-8 w-full max-w-sm text-center">
     <div class="text-6xl mb-4">
      🎉
     </div>
     <h2 class="text-2xl font-bold text-purple-700 mb-2">Selesai!</h2>
     <p class="text-lg text-gray-600 mb-1">Skor kamu:</p>
     <p id="final-score" class="text-5xl font-bold text-yellow-500 mb-4"></p>
     <div id="stars" class="flex justify-center gap-1 mb-4"></div><button id="restart-btn" class="bg-gradient-to-r from-purple-500 to-pink-500 text-white font-bold px-8 py-3 rounded-full shadow-lg hover:scale-105 transition-transform">Main Lagi 🔄</button>
    </div>
   </div>
  </div>
  <script>
const items = [
  { emoji: "🍎", name: "Apel", letter: "A" },
  { emoji: "🐝", name: "Lebah", letter: "L" },
  { emoji: "🐱", name: "Kucing", letter: "K" },
  { emoji: "🐶", name: "Anjing", letter: "A" },
  { emoji: "🐘", name: "Gajah", letter: "G" },
  { emoji: "🐟", name: "Ikan", letter: "I" },
  { emoji: "🌺", name: "Bunga", letter: "B" },
  { emoji: "📖", name: "Buku", letter: "B" },
  { emoji: "🚗", name: "Mobil", letter: "M" },
  { emoji: "✈️", name: "Pesawat", letter: "P" },
  { emoji: "🏠", name: "Rumah", letter: "R" },
  { emoji: "⭐", name: "Bintang", letter: "B" },
  { emoji: "🌙", name: "Bulan", letter: "B" },
  { emoji: "☀️", name: "Matahari", letter: "M" },
  { emoji: "🍌", name: "Pisang", letter: "P" },
  { emoji: "🎈", name: "Balon", letter: "B" },
  { emoji: "🐔", name: "Ayam", letter: "A" },
  { emoji: "🐸", name: "Katak", letter: "K" },
  { emoji: "🌳", name: "Pohon", letter: "P" },
  { emoji: "🦋", name: "Kupu-kupu", letter: "K" },
  { emoji: "🍉", name: "Semangka", letter: "S" },
  { emoji: "🐢", name: "Kura-kura", letter: "K" },
  { emoji: "🎵", name: "Musik", letter: "M" },
  { emoji: "🖊️", name: "Pena", letter: "P" },
  { emoji: "👟", name: "Sepatu", letter: "S" },
  { emoji: "🪑", name: "Kursi", letter: "K" },
  { emoji: "🍚", name: "Nasi", letter: "N" },
  { emoji: "🥚", name: "Telur", letter: "T" },
  { emoji: "🧊", name: "Es", letter: "E" },
  { emoji: "🔑", name: "Kunci", letter: "K" }
];

let score = 0, current = 0, questions = [];
const allLetters = "ABCDEFGHIJKLMNOPRSTUVWY".split("");

function shuffle(arr) { 
  const a = [...arr]; 
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} 
  return a; 
}

function startGame() {
  score = 0; current = 0;
  questions = shuffle(items).slice(0, 10);
  document.getElementById('score').textContent = '0';
  document.getElementById('end-screen').classList.add('hidden');
  document.getElementById('game-card').classList.remove('hidden');
  document.getElementById('next-btn').classList.add('hidden');
  showQuestion();
}

function showQuestion() {
  const q = questions[current];
  document.getElementById('qnum').textContent = current + 1;
  document.getElementById('emoji-display').textContent = q.emoji;
  document.getElementById('emoji-display').className = 'text-8xl mb-2 fade-in';
  document.getElementById('item-name').textContent = `"${q.name}"`;
  document.getElementById('feedback').textContent = '';
  document.getElementById('next-btn').classList.add('hidden');

  // Generate choices
  let choices = [q.letter];
  const others = allLetters.filter(l => l !== q.letter);
  const shuffled = shuffle(others);
  choices.push(shuffled[0], shuffled[1]);
  choices = shuffle(choices);

  const container = document.getElementById('choices');
  container.innerHTML = '';
  choices.forEach(letter => {
    const btn = document.createElement('button');
    btn.textContent = letter;
    btn.className = 'bg-gradient-to-br from-indigo-400 to-purple-500 text-white text-2xl font-bold py-4 rounded-2xl shadow-md hover:scale-105 transition-transform active:scale-95';
    btn.onclick = () => checkAnswer(letter, q.letter, btn);
    container.appendChild(btn);
  });
}

function checkAnswer(selected, correct, btn) {
  const buttons = document.querySelectorAll('#choices button');
  buttons.forEach(b => b.onclick = null);

  if (selected === correct) {
    score++;
    document.getElementById('score').textContent = score;
    btn.className = btn.className.replace('from-indigo-400 to-purple-500', 'from-green-400 to-green-600');
    btn.classList.add('bounce');
    document.getElementById('feedback').innerHTML = '<span class="text-green-500">✅ Benar! Hebat!</span>';
  } else {
    btn.className = btn.className.replace('from-indigo-400 to-purple-500', 'from-red-400 to-red-600');
    btn.classList.add('shake');
    buttons.forEach(b => {
      if (b.textContent === correct) b.className = b.className.replace('from-indigo-400 to-purple-500', 'from-green-400 to-green-600');
    });
    document.getElementById('feedback').innerHTML = `<span class="text-red-500">❌ Jawabannya "${correct}"</span>`;
  }

  document.getElementById('next-btn').classList.remove('hidden');
}

document.getElementById('next-btn').onclick = () => {
  current++;
  if (current >= 10) endGame();
  else showQuestion();
};

function endGame() {
  document.getElementById('game-card').classList.add('hidden');
  document.getElementById('next-btn').classList.add('hidden');
  document.getElementById('end-screen').classList.remove('hidden');
  document.getElementById('final-score').textContent = `${score}/10`;
  
  const stars = document.getElementById('stars');
  const starCount = score >= 9 ? 5 : score >= 7 ? 4 : score >= 5 ? 3 : score >= 3 ? 2 : 1;
  stars.innerHTML = '';
  for (let i = 0; i < starCount; i++) {
    const s = document.createElement('span');
    s.textContent = '⭐';
    s.className = 'text-3xl star-pop';
    s.style.animationDelay = `${i * 0.15}s`;
    stars.appendChild(s);
  }
}

document.getElementById('restart-btn').onclick = startGame;

// Element SDK
const defaultConfig = {
  game_title: "Tebak Huruf Awal",
  background_color: "#667eea",
  surface_color: "#ffffff",
  text_color: "#374151",
  primary_action_color: "#6366f1",
  secondary_action_color: "#eab308",
  font_family: "Fredoka",
  font_size: 16
};

window.elementSdk.init({
  defaultConfig,
  onConfigChange: async (config) => {
    const title = config.game_title || defaultConfig.game_title;
    document.getElementById('title').textContent = `🎮 ${title}`;
    
    const bg = config.background_color || defaultConfig.background_color;
    document.getElementById('app').style.background = `linear-gradient(135deg, ${bg} 0%, #764ba2 50%, #f093fb 100%)`;
    
    const surface = config.surface_color || defaultConfig.surface_color;
    document.getElementById('game-card').style.backgroundColor = surface;
    document.getElementById('end-screen').style.backgroundColor = surface;
    
    const textCol = config.text_color || defaultConfig.text_color;
    document.getElementById('item-name').style.color = textCol;
    
    const font = config.font_family || defaultConfig.font_family;
    document.body.style.fontFamily = `${font}, Fredoka, sans-serif`;

    const size = config.font_size || defaultConfig.font_size;
    document.getElementById('title').style.fontSize = `${size * 2}px`;
    document.getElementById('item-name').style.fontSize = `${size * 1.25}px`;
  },
  mapToCapabilities: (config) => ({
    recolorables: [
      { get: () => config.background_color || defaultConfig.background_color, set: (v) => { config.background_color = v; window.elementSdk.setConfig({ background_color: v }); } },
      { get: () => config.surface_color || defaultConfig.surface_color, set: (v) => { config.surface_color = v; window.elementSdk.setConfig({ surface_color: v }); } },
      { get: () => config.text_color || defaultConfig.text_color, set: (v) => { config.text_color = v; window.elementSdk.setConfig({ text_color: v }); } },
      { get: () => config.primary_action_color || defaultConfig.primary_action_color, set: (v) => { config.primary_action_color = v; window.elementSdk.setConfig({ primary_action_color: v }); } },
      { get: () => config.secondary_action_color || defaultConfig.secondary_action_color, set: (v) => { config.secondary_action_color = v; window.elementSdk.setConfig({ secondary_action_color: v }); } }
    ],
    borderables: [],
    fontEditable: { get: () => config.font_family || defaultConfig.font_family, set: (v) => { config.font_family = v; window.elementSdk.setConfig({ font_family: v }); } },
    fontSizeable: { get: () => config.font_size || defaultConfig.font_size, set: (v) => { config.font_size = v; window.elementSdk.setConfig({ font_size: v }); } }
  }),
  mapToEditPanelValues: (config) => new Map([
    ["game_title", config.game_title || defaultConfig.game_title]
  ])
});

startGame();
</script>
